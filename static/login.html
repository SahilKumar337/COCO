<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFRA AI — Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        /* ── Auth Page — Apple ID-inspired login ── */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: rgba(28, 28, 30, 0.60);
            backdrop-filter: saturate(180%) blur(40px);
            -webkit-backdrop-filter: saturate(180%) blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 44px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow:
                0 24px 48px rgba(0,0,0,0.40),
                inset 0 0.5px 0 rgba(255,255,255,0.06);
            animation: cardAppear 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(16px) scale(0.98);
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-header img {
            width: 56px;
            height: 56px;
            margin-bottom: 20px;
            border-radius: 14px;
        }

        .auth-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 8px 0;
            letter-spacing: -0.8px;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-tertiary);
            margin: 0;
            font-weight: 400;
            letter-spacing: -0.1px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            font-weight: 400;
            letter-spacing: -0.2px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            box-sizing: border-box;
        }

        .auth-input::placeholder {
            color: var(--text-quaternary);
        }

        .auth-input:focus {
            border-color: var(--accent);
            background: rgba(10, 132, 255, 0.04);
        }

        .auth-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: filter 0.2s, transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            margin-top: 6px;
            box-shadow: 0 2px 12px rgba(10, 132, 255, 0.30);
        }

        .auth-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(10, 132, 255, 0.40);
        }

        .auth-btn:active {
            transform: scale(0.97);
        }

        .auth-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--text-quaternary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 0.5px solid var(--separator);
        }
        .divider:not(:empty)::before { margin-right: .8em; }
        .divider:not(:empty)::after { margin-left: .8em; }

        .google-btn {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 0.5px solid rgba(255, 255, 255, 0.10) !important;
            color: var(--text-primary) !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 500 !important;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: rgba(255, 255, 255, 0.18) !important;
            transform: none !important;
            filter: none !important;
        }

        .auth-switch {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: var(--text-tertiary);
            letter-spacing: -0.1px;
        }

        .auth-switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: var(--red);
            font-size: 13px;
            text-align: center;
            margin-top: -4px;
            margin-bottom: 4px;
            display: none;
            font-weight: 500;
            letter-spacing: -0.1px;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card" id="login-card">
            <div class="auth-header">
                <img src="/static/assets/sifra-logo.png" alt="SIFRA">
                <h2 class="auth-title">Welcome to SIFRA</h2>
                <p class="auth-subtitle">Sign in to your assistant</p>
            </div>

            <p class="error-msg" id="login-error"></p>

            <form class="auth-form" id="login-form">
                <input type="email" id="login-email" class="auth-input" placeholder="Email" required autocomplete="email">
                <input type="password" id="login-password" class="auth-input" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="auth-btn" id="login-btn">Sign In</button>
            </form>

            <div id="google-login-section">
                <div class="divider">or</div>
                <a href="/api/auth/google/login" style="text-decoration: none;" id="google-login-link">
                    <button class="auth-btn google-btn" style="width: 100%;">
                        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                                <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/>
                                <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/>
                                <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/>
                                <path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/>
                            </g>
                        </svg>
                        Continue with Google
                    </button>
                </a>
            </div>

            <div class="auth-switch">
                Don't have an account? <a href="#" id="show-signup">Sign up</a>
            </div>
        </div>

        <div class="auth-card" id="signup-card" style="display: none;">
            <div class="auth-header">
                <img src="/static/assets/sifra-logo.png" alt="SIFRA">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Set up your personal assistant</p>
            </div>

            <p class="error-msg" id="signup-error"></p>

            <form class="auth-form" id="signup-form">
                <input type="text" id="signup-name" class="auth-input" placeholder="Name" required>
                <input type="email" id="signup-email" class="auth-input" placeholder="Email" required autocomplete="email">
                <input type="password" id="signup-password" class="auth-input" placeholder="Password" required autocomplete="new-password">
                <button type="submit" class="auth-btn" id="signup-btn">Create Account</button>
            </form>

            <div id="google-signup-section">
                <div class="divider">or</div>
                <a href="/api/auth/google/login" style="text-decoration: none;" id="google-signup-link">
                    <button class="auth-btn google-btn" style="width: 100%;">
                        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                                <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/>
                                <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/>
                                <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/>
                                <path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/>
                            </g>
                        </svg>
                        Sign up with Google
                    </button>
                </a>
            </div>

            <div class="auth-switch">
                Already have an account? <a href="#" id="show-login">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        /* ── Minimal ambient particles (Apple-style subtle) ── */
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let particles = [];
        for (let i = 0; i < 35; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
                size: Math.random() * 1.2 + 0.4,
                alpha: Math.random() * 0.25 + 0.05
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        /* ── Google OAuth check ── */
        (async () => {
            try {
                const r = await fetch('/api/auth/google/login', { redirect: 'manual' });
                if (r.status >= 500) {
                    document.getElementById('google-login-section').style.display = 'none';
                    document.getElementById('google-signup-section').style.display = 'none';
                }
            } catch (_) {}
        })();

        /* ── Card toggles ── */
        document.getElementById('show-signup').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('login-card').style.display = 'none';
            const signup = document.getElementById('signup-card');
            signup.style.display = 'block';
            signup.style.animation = 'none';
            signup.offsetHeight; // trigger reflow
            signup.style.animation = 'cardAppear 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards';
        });

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('signup-card').style.display = 'none';
            const login = document.getElementById('login-card');
            login.style.display = 'block';
            login.style.animation = 'none';
            login.offsetHeight;
            login.style.animation = 'cardAppear 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards';
        });

        /* ── Login form ── */
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');
            btn.disabled = true;
            btn.innerText = 'Signing in…';
            err.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-password').value
                    })
                });
                if (!res.ok) throw new Error((await res.json()).detail || 'Login failed');
                window.location.href = '/';
            } catch (error) {
                err.innerText = error.message;
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        });

        /* ── Signup form ── */
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const err = document.getElementById('signup-error');
            btn.disabled = true;
            btn.innerText = 'Creating Account…';
            err.style.display = 'none';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('signup-name').value,
                        email: document.getElementById('signup-email').value,
                        password: document.getElementById('signup-password').value
                    })
                });
                if (!res.ok) throw new Error((await res.json()).detail || 'Signup failed');
                window.location.href = '/';
            } catch (error) {
                err.innerText = error.message;
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Create Account';
            }
        });
    </script>
</body>
</html>
